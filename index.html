<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Registro de Ponto • Paleta #620000</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* ... (mantenha todo o CSS original) ... */
    </style>
</head>
<body>
    <!-- ... (mantenha todo o HTML original) ... -->

<script>
    (function(){
        "use strict";

        // ⚠️ ATUALIZE ESTA URL COM A NOVA IMPLANTAÇÃO DO APPS SCRIPT
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwH7PQXy6z5XitrdLG2N_4Iq-Le7mL51f6pKc2jBgzzb_3RPPKgFV0ibC2N06qQY5Ta/exec';
        
        // Configuração de timeout para chamadas JSONP (15 segundos)
        const JSONP_TIMEOUT = 15000;

        let colaboradores = [];
        let colaboradorSelecionado = null;
        let marcacoes = [
            { hora: null, local: null, iso: null },
            { hora: null, local: null, iso: null },
            { hora: null, local: null, iso: null },
            { hora: null, local: null, iso: null }
        ];
        let proximoIndice = 0;

        const dataSpan = document.getElementById('dataCompleta');
        const diaSemanaSpan = document.getElementById('diaSemana');
        const selectColab = document.getElementById('selectColaborador');
        const btnCadastrar = document.getElementById('btnCadastrarNovo');
        const btnMarcar = document.getElementById('btnMarcarPonto');
        const btnReset = document.getElementById('btnResetarDia');
        const btnGerenciarColabs = document.getElementById('btnGerenciarColabs');
        const btnToggleRelatorio = document.getElementById('btnToggleRelatorio');
        const btnFecharRelatorio = document.getElementById('btnFecharRelatorio');
        const btnBuscarRelatorio = document.getElementById('btnBuscarRelatorio');
        const btnExportExcel = document.getElementById('btnExportExcel');
        const btnExportPNG = document.getElementById('btnExportPNG');
        const statusText = document.getElementById('statusText');
        const listaColabsDiv = document.getElementById('listaColabs');
        const relatorioSection = document.getElementById('relatorioSection');
        const resultadoRelatorio = document.getElementById('resultadoRelatorio');
        const filtroDataInicio = document.getElementById('filtroDataInicio');
        const filtroDataFim = document.getElementById('filtroDataFim');

        const horaEls = [
            document.getElementById('hora1'), document.getElementById('hora2'), 
            document.getElementById('hora3'), document.getElementById('hora4')
        ];
        const localEls = [
            document.getElementById('local1'), document.getElementById('local2'), 
            document.getElementById('local3'), document.getElementById('local4')
        ];
        const cards = [
            document.getElementById('card1'), document.getElementById('card2'), 
            document.getElementById('card3'), document.getElementById('card4')
        ];

        let dadosTabelaAtual = [];

        // ============================================
        // FUNÇÃO AUXILIAR PARA CHAMADAS JSONP (COM TIMEOUT)
        // ============================================
        function jsonpRequest(params, timeoutMs = JSONP_TIMEOUT) {
            return new Promise((resolve, reject) => {
                const callbackName = 'jsonpCallback_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
                const url = SCRIPT_URL + '?' + params.toString();
                
                console.log(`📤 JSONP Request [${callbackName}]:`, url);
                
                const timeoutId = setTimeout(() => {
                    console.error(`❌ JSONP Timeout após ${timeoutMs}ms:`, url);
                    cleanup();
                    reject(new Error('Timeout na requisição'));
                }, timeoutMs);
                
                const cleanup = () => {
                    clearTimeout(timeoutId);
                    if (window[callbackName]) {
                        delete window[callbackName];
                    }
                    if (script.parentNode) {
                        document.body.removeChild(script);
                    }
                };
                
                window[callbackName] = (response) => {
                    console.log(`✅ JSONP Response [${callbackName}]:`, response);
                    cleanup();
                    resolve(response);
                };
                
                const script = document.createElement('script');
                script.src = url.replace('jsonpCallback', callbackName);
                script.onerror = () => {
                    console.error(`❌ JSONP Error [${callbackName}]`);
                    cleanup();
                    reject(new Error('Erro na requisição JSONP'));
                };
                
                document.body.appendChild(script);
            });
        }

        function atualizarDataAtual() {
            const agora = new Date();
            dataSpan.textContent = agora.toLocaleDateString('pt-BR', { year: 'numeric', month: 'long', day: 'numeric' });
            diaSemanaSpan.textContent = agora.toLocaleDateString('pt-BR', { weekday: 'long' });
            
            const hoje = new Date().toISOString().split('T')[0];
            const seteDiasAtras = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
            if (!filtroDataFim.value) filtroDataFim.value = hoje;
            if (!filtroDataInicio.value) filtroDataInicio.value = seteDiasAtras;
        }
        atualizarDataAtual();
        setInterval(atualizarDataAtual, 60000);

        // ============================================
        // CARREGAR COLABORADORES (CORRIGIDO)
        // ============================================
        async function carregarColaboradores() {
            statusText.textContent = '🔄 Sincronizando colaboradores...';
            
            try {
                const params = new URLSearchParams();
                params.append('acao', 'consultar_colaboradores');
                params.append('_', Date.now()); // Evitar cache
                
                const response = await jsonpRequest(params);
                console.log('👥 Resposta colaboradores:', response);
                
                if (response.status === 'success' && response.colaboradores && response.colaboradores.length > 0) {
                    colaboradores = response.colaboradores.slice();
                    statusText.textContent = '✅ Colaboradores sincronizados!';
                } else {
                    if (!colaboradores.length) {
                        colaboradores = [{ nome: 'Funcionário Padrão' }];
                    }
                    statusText.textContent = '📋 Usando colaborador padrão.';
                }
            } catch (error) {
                console.error('❌ Erro ao carregar colaboradores:', error);
                if (!colaboradores.length) {
                    colaboradores = [{ nome: 'Funcionário Padrão' }];
                }
                statusText.textContent = '⚠️ Erro ao sincronizar. Usando fallback.';
            }
            
            atualizarSelectColaboradores();
            await carregarMarcacoesDoDia();
        }

        function atualizarSelectColaboradores() {
            selectColab.innerHTML = '';
            colaboradores.forEach((c) => {
                const opt = document.createElement('option');
                opt.value = c.nome;
                opt.textContent = c.nome;
                selectColab.appendChild(opt);
            });
            
            if (colaboradorSelecionado && colaboradores.some(c => c.nome === colaboradorSelecionado)) {
                selectColab.value = colaboradorSelecionado;
            } else if (colaboradores.length) {
                colaboradorSelecionado = colaboradores[0].nome;
                selectColab.value = colaboradorSelecionado;
            }
            atualizarListaColabs();
        }

        function atualizarListaColabs() {
            if (colaboradores.length > 1) {
                listaColabsDiv.innerHTML = `<i class="fas fa-users" style="color:#620000;"></i> ${colaboradores.map(c=>c.nome).join(' • ')}`;
            } else {
                listaColabsDiv.innerHTML = '';
            }
        }

        function atualizarCardsMarcacoes() {
            for (let i=0; i<4; i++) {
                const m = marcacoes[i];
                if (m.hora) {
                    horaEls[i].textContent = m.hora;
                    localEls[i].innerHTML = `<i class="fas fa-map-pin"></i> ${m.local || 'Localização não disponível'}`;
                    cards[i].classList.add('preenchido');
                } else {
                    horaEls[i].textContent = '—:—';
                    localEls[i].innerHTML = `<i class="fas fa-map-pin"></i> Aguardando...`;
                    cards[i].classList.remove('preenchido');
                }
            }
            atualizarStatusBotao();
        }

        function atualizarStatusBotao() {
            if (!colaboradorSelecionado) {
                btnMarcar.disabled = true;
                statusText.textContent = 'Cadastre ou selecione um colaborador.';
                return;
            }
            if (proximoIndice >= 4) {
                btnMarcar.disabled = true;
                statusText.textContent = '✅ Todas as marcações do dia concluídas.';
            } else {
                btnMarcar.disabled = false;
                const nomes = ['Início da jornada', 'Saída para almoço', 'Retorno do almoço', 'Fim do expediente'];
                statusText.textContent = `Próximo: ${nomes[proximoIndice]} • Clique em "Registrar Ponto"`;
            }
        }

        function obterLocalizacao() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) return resolve('Geolocalização não suportada');
                navigator.geolocation.getCurrentPosition(
                    (pos) => resolve(`Lat ${pos.coords.latitude.toFixed(5)}, Lng ${pos.coords.longitude.toFixed(5)}`),
                    (err) => resolve(`📍 ${err.code === 1 ? 'Permissão negada' : 'Posição indisponível'}`),
                    { enableHighAccuracy: false, timeout: 6000, maximumAge: 30000 }
                );
            });
        }

        async function salvarNoGoogleSheet(acao = 'registrar') {
            if (!colaboradorSelecionado) return false;

            const dataHoje = new Date();
            const dataHojeISO = dataHoje.toISOString().split('T')[0];

            const params = new URLSearchParams();
            params.append('acao', acao);
            params.append('colaborador', colaboradorSelecionado);
            params.append('data', dataHojeISO);
            params.append('marcacao1', marcacoes[0].hora || '');
            params.append('local1', marcacoes[0].local || '');
            params.append('marcacao2', marcacoes[1].hora || '');
            params.append('local2', marcacoes[1].local || '');
            params.append('marcacao3', marcacoes[2].hora || '');
            params.append('local3', marcacoes[2].local || '');
            params.append('marcacao4', marcacoes[3].hora || '');
            params.append('local4', marcacoes[3].local || '');
            params.append('tipo_marcacao', proximoIndice.toString());
            params.append('iso_timestamp', dataHoje.toISOString());
            params.append('_', Date.now()); // Evitar cache

            try {
                const response = await jsonpRequest(params);
                console.log('✅ Resposta salvar:', response);
                return true;
            } catch (error) {
                console.error('❌ Erro ao salvar:', error);
                return false;
            }
        }

        async function registrarPonto() {
            if (!colaboradorSelecionado) { alert('Selecione um colaborador.'); return; }
            if (proximoIndice >= 4) { alert('Todas as marcações já foram feitas.'); return; }

            btnMarcar.disabled = true;
            statusText.textContent = 'Obtendo localização...';

            try {
                const agora = new Date();
                const horaFormatada = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                const local = await obterLocalizacao();

                marcacoes[proximoIndice] = { hora: horaFormatada, local: local, iso: agora.toISOString() };

                statusText.textContent = 'Salvando...';
                const salvou = await salvarNoGoogleSheet('registrar');

                if (salvou) {
                    atualizarCardsMarcacoes();
                    proximoIndice++;
                    
                    const etapas = ['1ª (início)', '2ª (saída almoço)', '3ª (retorno)', '4ª (fim)'];
                    statusText.textContent = proximoIndice < 4 
                        ? `✅ ${etapas[proximoIndice-1]} registrada! Próximo: ${proximoIndice+1}ª.`
                        : '🎉 Expediente completo!';
                } else {
                    statusText.textContent = '❌ Erro ao salvar. Tente novamente.';
                }
            } catch (error) {
                statusText.textContent = '❌ Erro ao registrar.';
            } finally {
                atualizarStatusBotao();
            }
        }

        async function resetarDia() {
            if (!confirm('⚠️ Apagar todas as marcações do dia atual?\nIsso também removerá os registros da planilha!')) return;
            
            statusText.textContent = 'Removendo registros da planilha...';
            
            marcacoes = [
                { hora: null, local: null, iso: null },
                { hora: null, local: null, iso: null },
                { hora: null, local: null, iso: null },
                { hora: null, local: null, iso: null }
            ];
            
            const salvou = await salvarNoGoogleSheet('resetar');
            
            proximoIndice = 0;
            atualizarCardsMarcacoes();
            statusText.textContent = salvou ? '✅ Dia resetado!' : '⚠️ Erro ao resetar.';
        }

        function gerenciarColaboradores() {
            let mensagem = '📋 COLABORADORES CADASTRADOS:\n\n';
            colaboradores.forEach((c, i) => mensagem += `${i+1}. ${c.nome}\n`);
            mensagem += '\n━━━━━━━━━━━━━━━━━━━━\n';
            mensagem += 'Digite o NÚMERO ou NOME para remover\n';
            mensagem += 'Ou digite "LIMPAR" para remover todos';
            
            const acao = prompt(mensagem);
            if (!acao) return;
            
            if (acao.toUpperCase() === 'LIMPAR') {
                if (confirm('⚠️ Remover TODOS os colaboradores?')) {
                    colaboradores = [{ nome: 'Funcionário Padrão' }];
                    atualizarSelectColaboradores();
                }
                return;
            }
            
            const num = parseInt(acao);
            if (!isNaN(num) && num > 0 && num <= colaboradores.length) {
                removerColaborador(num - 1);
                return;
            }
            
            const index = colaboradores.findIndex(c => c.nome.toLowerCase().includes(acao.toLowerCase()));
            if (index !== -1) removerColaborador(index);
            else alert('❌ Colaborador não encontrado!');
        }

        function removerColaborador(index) {
            if (colaboradores.length === 1) { alert('⚠️ Não é possível remover o único colaborador!'); return; }
            const nome = colaboradores[index].nome;
            if (confirm(`Remover "${nome}"?`)) {
                colaboradores.splice(index, 1);
                atualizarSelectColaboradores();
                statusText.textContent = `✅ "${nome}" removido!`;
            }
        }

        // ============================================
        // BUSCAR RELATÓRIO (CORRIGIDO)
        // ============================================
        async function buscarRelatorio() {
            const dataInicio = filtroDataInicio.value;
            const dataFim = filtroDataFim.value;
            
            if (!dataInicio || !dataFim) {
                resultadoRelatorio.innerHTML = '<div class="sem-registros">Selecione as datas</div>';
                return;
            }

            statusText.textContent = '🔄 Buscando dados da planilha...';
            
            try {
                const params = new URLSearchParams();
                params.append('acao', 'consultar');
                params.append('dataInicio', dataInicio);
                params.append('dataFim', dataFim);
                params.append('colaborador', colaboradorSelecionado || 'todos');
                params.append('debug', 'true'); // Adicionar debug para ver logs no Apps Script
                params.append('_', Date.now()); // Evitar cache
                
                const response = await jsonpRequest(params, 20000); // Timeout maior para consultas
                console.log('📊 Dados recebidos:', response);
                
                if (response.status === 'success' && response.registros) {
                    const registros = response.registros;
                    
                    if (registros.length === 0) {
                        resultadoRelatorio.innerHTML = '<div class="sem-registros">Nenhum registro encontrado</div>';
                        dadosTabelaAtual = [];
                        statusText.textContent = '📋 Nenhum registro no período';
                    } else {
                        dadosTabelaAtual = registros.sort((a, b) => {
                            const partesA = a.data.split('/');
                            const partesB = b.data.split('/');
                            if (partesA.length === 3 && partesB.length === 3) {
                                const dataA = new Date(partesA[2], partesA[1] - 1, partesA[0]);
                                const dataB = new Date(partesB[2], partesB[1] - 1, partesB[0]);
                                return dataB - dataA;
                            }
                            return 0;
                        }).map(reg => ({
                            data: reg.data,
                            colaborador: reg.colaborador,
                            m1: reg.marcacao1 || '—',
                            m2: reg.marcacao2 || '—',
                            m3: reg.marcacao3 || '—',
                            m4: reg.marcacao4 || '—'
                        }));
                        
                        let html = `
                            <table class="tabela-relatorio" id="tabelaExport">
                                <thead><tr><th>Data</th><th>Colaborador</th><th>1ª</th><th>2ª</th><th>3ª</th><th>4ª</th></tr></thead>
                                <tbody>
                        `;
                        
                        dadosTabelaAtual.forEach(reg => {
                            html += `<tr><td>${reg.data}</td><td class="colab-nome">${reg.colaborador}</td><td class="hora-cell">${reg.m1}</td><td class="hora-cell">${reg.m2}</td><td class="hora-cell">${reg.m3}</td><td class="hora-cell">${reg.m4}</td></tr>`;
                        });
                        
                        html += '</tbody></table>';
                        resultadoRelatorio.innerHTML = html;
                        statusText.textContent = `✅ ${registros.length} registros encontrados`;
                    }
                } else {
                    resultadoRelatorio.innerHTML = '<div class="sem-registros">Erro ao buscar dados</div>';
                    statusText.textContent = '❌ Erro na consulta';
                }
            } catch (error) {
                console.error('❌ Erro na consulta:', error);
                resultadoRelatorio.innerHTML = '<div class="sem-registros">Erro de conexão</div>';
                statusText.textContent = '❌ Erro de conexão';
            }
        }

        function exportarExcel() {
            if (dadosTabelaAtual.length === 0) {
                alert('Nenhum dado para exportar!');
                return;
            }
            
            let csv = 'Data,Colaborador,1ª Marcação,2ª Marcação,3ª Marcação,4ª Marcação\n';
            dadosTabelaAtual.forEach(reg => {
                csv += `"${reg.data}","${reg.colaborador}","${reg.m1}","${reg.m2}","${reg.m3}","${reg.m4}"\n`;
            });
            
            const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `ponto_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
            
            statusText.textContent = '✅ Relatório exportado para Excel!';
        }

        async function exportarPNG() {
            const tabela = document.querySelector('.tabela-relatorio');
            if (!tabela) {
                alert('Nenhuma tabela para exportar!');
                return;
            }
            
            statusText.textContent = '📸 Gerando imagem...';
            
            try {
                const canvas = await html2canvas(tabela, {
                    scale: 2,
                    backgroundColor: '#ffffff',
                    allowTaint: false,
                    useCORS: true
                });
                
                const link = document.createElement('a');
                link.download = `ponto_${new Date().toISOString().slice(0,10)}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                statusText.textContent = '✅ Imagem exportada com sucesso!';
            } catch (err) {
                console.error('Erro ao exportar PNG:', err);
                statusText.textContent = '❌ Erro ao gerar imagem';
            }
        }

        function toggleRelatorio() {
            if (relatorioSection.style.display === 'none') {
                relatorioSection.style.display = 'block';
                btnToggleRelatorio.innerHTML = '<i class="fas fa-times"></i> Fechar';
                buscarRelatorio();
            } else {
                relatorioSection.style.display = 'none';
                btnToggleRelatorio.innerHTML = '<i class="fas fa-chart-bar"></i> Relatório';
            }
        }

        function resetarMarcacoes() {
            marcacoes = [
                {hora:null,local:null,iso:null},
                {hora:null,local:null,iso:null},
                {hora:null,local:null,iso:null},
                {hora:null,local:null,iso:null}
            ];
            proximoIndice = 0;
        }

        function cadastrarNovoColaborador() {
            const nome = prompt('Nome do novo colaborador:');
            if (!nome || nome.trim() === '') return;
            const nomeLimpo = nome.trim();
            if (colaboradores.some(c => c.nome.toLowerCase() === nomeLimpo.toLowerCase())) {
                alert('Colaborador já cadastrado.');
                return;
            }
            colaboradores.push({ nome: nomeLimpo });
            colaboradorSelecionado = nomeLimpo;
            atualizarSelectColaboradores();
            statusText.textContent = `✅ "${nomeLimpo}" adicionado!`;
        }

        // ============================================
        // CARREGAR MARCAÇÕES DO DIA ATUAL (CORRIGIDO)
        // ============================================
        async function carregarMarcacoesDoDia() {
            if (!colaboradorSelecionado) return;
            
            statusText.textContent = '🔄 Carregando marcações do dia...';
            
            const hoje = new Date();
            const dataHojeISO = hoje.toISOString().split('T')[0];
            
            try {
                const params = new URLSearchParams();
                params.append('acao', 'consultar');
                params.append('dataInicio', dataHojeISO);
                params.append('dataFim', dataHojeISO);
                params.append('colaborador', colaboradorSelecionado);
                params.append('debug', 'true');
                params.append('_', Date.now());
                
                const response = await jsonpRequest(params);
                console.log('📊 Resposta marcações:', response);
                
                if (response.status === 'success' && response.registros && response.registros.length > 0) {
                    const registroHoje = response.registros.find(reg => {
                        if (!reg.data) return false;
                        // Converter data DD/MM/YYYY para YYYY-MM-DD para comparar
                        const partes = reg.data.split('/');
                        if (partes.length === 3) {
                            const dataRegistro = `${partes[2]}-${partes[1]}-${partes[0]}`;
                            return dataRegistro === dataHojeISO;
                        }
                        return false;
                    });
                    
                    if (registroHoje) {
                        console.log('✅ Encontrou registro de hoje:', registroHoje);
                        
                        if (registroHoje.marcacao1) {
                            marcacoes[0] = { 
                                hora: registroHoje.marcacao1, 
                                local: registroHoje.local1 || 'Carregado da planilha', 
                                iso: new Date().toISOString() 
                            };
                        }
                        if (registroHoje.marcacao2) {
                            marcacoes[1] = { 
                                hora: registroHoje.marcacao2, 
                                local: registroHoje.local2 || 'Carregado da planilha', 
                                iso: new Date().toISOString() 
                            };
                        }
                        if (registroHoje.marcacao3) {
                            marcacoes[2] = { 
                                hora: registroHoje.marcacao3, 
                                local: registroHoje.local3 || 'Carregado da planilha', 
                                iso: new Date().toISOString() 
                            };
                        }
                        if (registroHoje.marcacao4) {
                            marcacoes[3] = { 
                                hora: registroHoje.marcacao4, 
                                local: registroHoje.local4 || 'Carregado da planilha', 
                                iso: new Date().toISOString() 
                            };
                        }
                        
                        proximoIndice = marcacoes.findIndex(m => m.hora === null);
                        if (proximoIndice === -1) proximoIndice = 4;
                        
                        atualizarCardsMarcacoes();
                        statusText.textContent = '✅ Marcações de hoje carregadas!';
                    } else {
                        console.log('📋 Nenhum registro para hoje');
                        resetarMarcacoes();
                        atualizarCardsMarcacoes();
                        statusText.textContent = '📋 Nenhuma marcação hoje. Pronto para registrar.';
                    }
                } else {
                    console.log('📋 Nenhum registro encontrado');
                    resetarMarcacoes();
                    atualizarCardsMarcacoes();
                    statusText.textContent = '📋 Nenhuma marcação hoje. Pronto para registrar.';
                }
            } catch (error) {
                console.error('❌ Erro ao carregar marcações:', error);
                statusText.textContent = '⚠️ Erro ao carregar planilha';
            }
        }

        async function inicializar() {
            await carregarColaboradores();
            
            selectColab.addEventListener('change', async (e) => {
                colaboradorSelecionado = e.target.value;
                await carregarMarcacoesDoDia();
                atualizarStatusBotao();
            });

            btnCadastrar.addEventListener('click', cadastrarNovoColaborador);
            btnMarcar.addEventListener('click', registrarPonto);
            btnReset.addEventListener('click', resetarDia);
            btnGerenciarColabs.addEventListener('click', gerenciarColaboradores);
            btnToggleRelatorio.addEventListener('click', toggleRelatorio);
            btnFecharRelatorio.addEventListener('click', () => {
                relatorioSection.style.display = 'none';
                btnToggleRelatorio.innerHTML = '<i class="fas fa-chart-bar"></i> Relatório';
            });
            btnBuscarRelatorio.addEventListener('click', buscarRelatorio);
            btnExportExcel.addEventListener('click', exportarExcel);
            btnExportPNG.addEventListener('click', exportarPNG);
            
            console.log('✅ Sistema inicializado! Colaborador:', colaboradorSelecionado);
        }

        inicializar();
    })();
</script>
</body>
</html>
